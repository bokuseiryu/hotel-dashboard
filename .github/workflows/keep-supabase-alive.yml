# Supabaseプロジェクトの自動一時停止を防ぐための定期Pingワークフロー
# 2日ごとにSupabase APIにアクセスしてアクティブ状態を維持する（7日制限に対して十分な余裕）

name: Keep Supabase Alive

on:
  schedule:
    # 毎日偶数日の午前9時（UTC）に実行 → 約2日ごと、7日制限に対して十分な余裕
    - cron: '0 9 */2 * *'
  workflow_dispatch:
    # GitHubのActionsページから手動実行も可能
  push:
    branches:
      - master
    paths:
      - '.github/workflows/keep-supabase-alive.yml'

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    name: Ping hotel-dashboard Supabase

    steps:
      - name: hotel_data テーブルにPingを送信（--fail付き）
        run: |
          echo "=== Supabase hotel-dashboard Ping 開始 ==="
          echo "実行時刻: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          HTTP_STATUS=$(curl --fail --silent --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            "https://abfejycabbaicxoewvuj.supabase.co/rest/v1/hotel_data?select=id&limit=1" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Content-Type: application/json")

          echo "レスポンスステータス: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "✅ hotel_data Ping 成功 (HTTP ${HTTP_STATUS})"
          else
            echo "❌ hotel_data Ping 失敗 (HTTP ${HTTP_STATUS})"
            exit 1
          fi

      - name: hotel_improvements テーブルにPingを送信（--fail付き）
        run: |
          HTTP_STATUS=$(curl --fail --silent --show-error \
            --output /dev/null \
            --write-out "%{http_code}" \
            "https://abfejycabbaicxoewvuj.supabase.co/rest/v1/hotel_improvements?select=hotel_key&limit=1" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Content-Type: application/json")

          echo "レスポンスステータス: ${HTTP_STATUS}"

          if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
            echo "✅ hotel_improvements Ping 成功 (HTTP ${HTTP_STATUS})"
          else
            echo "❌ hotel_improvements Ping 失敗 (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "=== 全Ping完了 $(date -u '+%Y-%m-%d %H:%M:%S UTC') ==="
